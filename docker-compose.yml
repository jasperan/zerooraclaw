# ZeroOraClaw Docker Compose
#
# Local Oracle bootstrap for ZeroOraClaw.
#
# Quick start:
#   cp .env.example .env
#   docker compose up oracle-db -d
#   ./scripts/setup-oracle.sh
#   cargo build --release
#   ./target/release/zeroclaw setup-oracle

services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: zerooraclaw-oracle
    restart: unless-stopped
    environment:
      ORACLE_PWD: ${ZEROORACLAW_ORACLE_PASSWORD:-ZeroOraClaw2026}
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "${ORACLE_HOST_PORT:-1521}:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data:
